<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mc-texture-viewer demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #1a1a1a; }
    mc-texture-viewer { display: block; width: 100%; height: 100%; min-height: 400px; }
  </style>
</head>
<body>
  <mc-texture-viewer id="viewer" auto-rotate sun-enabled></mc-texture-viewer>
  <script type="module" src="/src/embed.ts"></script>
  <script type="module">
    import { warpedForestManifest } from '/src/viewer/textureManifest.js';
    const viewer = document.getElementById('viewer');
    viewer.setTextureManifest(warpedForestManifest);
    viewer.setAttribute('model-url', '/ejemploAntiguoModelo/warpedForest.obj');
    viewer.setAttribute('texture-base-url', '/ejemploAntiguoModelo/');
  </script>
</body>
</html>
