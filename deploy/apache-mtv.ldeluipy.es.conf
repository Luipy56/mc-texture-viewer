# mtv.ldeluipy.es — HTTP inicial; Certbot añade SSL y redirección HTTP→HTTPS

<VirtualHost *:80>
	ServerName mtv.ldeluipy.es
	DocumentRoot /var/www/mtv.ldeluipy.es

	<Directory /var/www/mtv.ldeluipy.es>
		Options -Indexes +FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/mtv.ldeluipy.es.error.log
	CustomLog ${APACHE_LOG_DIR}/mtv.ldeluipy.es.access.log combined
</VirtualHost>
